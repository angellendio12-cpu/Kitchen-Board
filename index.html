<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Kitchen Board</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <!-- Header -->
        <header>
            <h1>The Kitchen Board</h1>
            <p>Simple Pickleball Scoreboard</p>
        </header>

        <!-- =======================
             TEAM SETUP
        ========================-->

        <section class="setup-card">

            <div class="team-input">

                <input
                    type="text"
                    id="teamAInput"
                    placeholder="Enter Team A Name"
                    maxlength="25">

            </div>

            <div class="vs">

                VS

            </div>

            <div class="team-input">

                <input
                    type="text"
                    id="teamBInput"
                    placeholder="Enter Team B Name"
                    maxlength="25">

            </div>

        </section>

        <div class="start-container">

            <button
                id="startMatchBtn">

                START MATCH

            </button>

        </div>

        <!-- =======================
             SCOREBOARD
        ========================-->

        <section
            id="scoreboardSection"
            class="hidden">

            <div class="scoreboard-grid">

                <!-- TEAM A -->

                <div class="card">

                    <h2
                        id="teamAName">

                        Team A

                    </h2>

                    <div
                        id="teamAScore"
                        class="score">

                        0

                    </div>

                    <button
                        id="teamAButton">

                        + POINT

                    </button>

                </div>

                <!-- TEAM B -->

                <div class="card">

                    <h2
                        id="teamBName">

                        Team B

                    </h2>

                    <div
                        id="teamBScore"
                        class="score">

                        0

                    </div>

                    <button
                        id="teamBButton">

                        + POINT

                    </button>

                </div>

                <!-- SERVER CARD -->

                <div class="card">

                    <h2>

                        Server

                    </h2>

                    <div
                        id="serverDisplay"
                        class="server-display">

                        Team A

                    </div>

                    <button
                        id="serverButton">

                        Server #1

                    </button>

                </div>

            </div>

            <!-- SERVING TEAM -->

            <div class="serving-card">

                <strong>

                    Serving Team:

                </strong>

                <span
                    id="servingTeam">

                    Team A

                </span>

            </div>

            <!-- WINNER -->

            <div
                id="winnerBanner"
                class="winner-banner hidden">

                🏆 Winner

            </div>

            <!-- CONTROLS -->

            <div class="controls">

                <button
                    id="undoBtn">

                    Undo

                </button>

                <button
                    id="switchServerBtn">

                    Switch Server

                </button>

                <button
                    id="resetBtn">

                    New Match

                </button>

            </div>

        </section>

    </div>

    <!-- JavaScript -->

    <script src="script.js"></script>

</body>

</html>
